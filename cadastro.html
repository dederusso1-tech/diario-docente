{% extends "base.html" %}
{% block content %}
<div class="card card-gov p-4 mx-auto mt-5" style="max-width:400px;">
    <div class="text-center mb-4">
        <h3 class="text-success fw-bold">Credenciamento</h3>
        <small class="text-muted">Criação de identidade no sistema escolar</small>
    </div>
    <form method="POST" action="/cadastro">
        <div class="mb-3">
            <label class="form-label">Nome Completo:</label>
            <input type="text" name="nome" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">E-mail Profissional:</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Criar Senha Segura:</label>
            <input type="password" name="senha" class="form-control" required>
        </div>
        <button class="btn btn-success btn-gov w-100 p-2.5">Finalizar Registro</button>
    </form>
    <hr>
    <div class="text-center">
        <a href="/login" class="text-decoration-none">Já possui cadastro? Fazer Login</a>
    </div>
</div>
{% endblock %}
